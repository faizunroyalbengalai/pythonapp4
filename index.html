<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pyhon44</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 999px;
    }

    .card {
      width: 100%;
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1f6feb22, #388bfd33);
      border: 1px solid #388bfd55;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 38px;
      height: 38px;
      fill: #388bfd;
    }

    .project-name {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #1f6feb, #388bfd);
      border-radius: 999px;
    }

    .info-row {
      width: 100%;
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .info-row svg {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      fill: #388bfd;
    }

    .info-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 0.2rem;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: #e6edf3;
      word-break: break-all;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .repo-link:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .repo-link svg {
      width: 16px;
      height: 16px;
      fill: #ffffff;
    }

    footer {
      margin-top: 1rem;
      text-align: center;
      color: #484f58;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }

    footer span {
      color: #8b949e;
      font-weight: 600;
    }
  </style>
</head>
