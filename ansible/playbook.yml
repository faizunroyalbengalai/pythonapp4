---
- name: Deploy python app
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_port: 8000
    app_user: ubuntu
    app_name: python44

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - nginx
          - git
          - curl
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Clone or pull app from GitHub
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: "{{ app_user }}"

    - name: Check if requirements.txt exists
      stat:
        path: "{{ app_dir }}/requirements.txt"
      register: req_stat

    - name: Write default requirements.txt if missing
      copy:
        content: |
          fastapi
          uvicorn[standard]
          gunicorn
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
      when: not req_stat.stat.exists

    - name: Check if main.py exists
      stat:
        path: "{{ app_dir }}/main.py"
      register: main_stat

    - name: Write default main.py if missing
      copy:
        content: |
          from fastapi import FastAPI
          from fastapi.responses import HTMLResponse
          import os

          app = FastAPI()

          @app.get("/", response_class=HTMLResponse)
          def root():
              index_path = os.path.join(os.path.dirname(__file__), "index.html")
              if os.path.exists(index_path):
                  with open(index_path) as f:
                      return HTMLResponse(content=f.read())
              return HTMLResponse(content="<h1>python44</h1><p>Deployed with Ansible</p>")

          @app.get("/health")
          def health():
              return {"status": "ok"}
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
      when: not main_stat.stat.exists

    - name: Create virtualenv
      shell: python3 -m venv {{ app_dir }}/venv
      args:
        creates: "{{ app_dir }}/venv/bin/activate"
      become: yes
      become_user: "{{ app_user }}"

    - name: Install Python requirements
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: python3 -m venv
      become: yes
      become_user: "{{ app_user }}"

    - name: Write .env file
      copy:
        content: |
          {% if database_url is defined and database_url != '' %}
          DATABASE_URL={{ database_url }}
          {% endif %}
          {% if mongo_uri is defined and mongo_uri != '' %}
          MONGO_URI={{ mongo_uri }}
          {% endif %}
          {% if db_host is defined and db_host != '' %}
          DB_HOST={{ db_host }}
          {% endif %}
          {% if db_port is defined and db_port != '' %}
          DB_PORT={{ db_port }}
          {% endif %}
          {% if db_name is defined and db_name != '' %}
          DB_NAME={{ db_name }}
          {% endif %}
          {% if db_user is defined and db_user != '' %}
          DB_USER={{ db_user }}
          {% endif %}
          {% if db_password is defined and db_password != '' %}
          DB_PASSWORD={{ db_password }}
          {% endif %}
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'

    - name: Create systemd service for app
      copy:
        content: |
          [Unit]
          Description=python44 Python App
          After=network.target

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ app_dir }}/venv/bin/gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:{{ app_port }} main:app
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/app.service
        mode: '0644'
      notify: restart app

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start app service
      systemd:
        name: app
        state: started
        enabled: yes

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx

    - name: Configure nginx reverse proxy
      copy:
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_cache_bypass $http_upgrade;
              }
          }
        dest: /etc/nginx/sites-enabled/app
        mode: '0644'
      notify: reload nginx

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Wait for app to be available on port 8000
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        timeout: 120
        delay: 10
      register: wait_result
      ignore_errors: yes

    - name: Show journalctl logs if app failed to start
      shell: journalctl -u app --no-pager -n 50
      register: journal_output
      when: wait_result is failed

    - name: Print journal logs
      debug:
        msg: "{{ journal_output.stdout_lines }}"
      when: wait_result is failed

    - name: Fail if app did not start
      fail:
        msg: "App did not start within timeout. Check logs above."
      when: wait_result is failed

    - name: Print server IP on success
      debug:
        msg: "server_ip={{ ansible_host }}"

  handlers:
    - name: restart app
      systemd:
        name: app
        state: restarted
        daemon_reload: yes

    - name: reload nginx
      service:
        name: nginx
        state: reloaded